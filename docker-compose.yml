version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: orchestrator_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    command: ["--replSet", "rs0", "--bind_ip_all", "--port", "27017"]
    healthcheck:
      test: test $$(echo "rs.initiate({_id:'rs0',members:[{_id:0,host:\"localhost:27017\"}]}).ok || rs.status().ok" | mongosh --quiet) -eq 1
      interval: 10s
      start_period: 30s

  rabbitmq:
    image: heidiks/rabbitmq-delayed-message-exchange:latest
    container_name: orchestrator_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

volumes:
  mongo_data: